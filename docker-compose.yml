services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "8000:8000"
    volumes:
      - sessions_data:/data/sessions
      - workspaces_data:/data/workspaces
    environment:
      - PANDA_LLM_API_URL=${PANDA_LLM_API_URL:-https://api.openai.com/v1}
      - PANDA_LLM_API_KEY=${PANDA_LLM_API_KEY}
      - PANDA_LLM_MODEL=${PANDA_LLM_MODEL:-gpt-4o}
      - PANDA_DEBUG=true
      - PANDA_SESSION_STORAGE_PATH=/data/sessions
      - PANDA_WORKSPACE_PATH=/data/workspaces
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://core:8000
    depends_on:
      - core
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core
      - frontend
    restart: unless-stopped

volumes:
  sessions_data:
  workspaces_data:
