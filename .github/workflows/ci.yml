name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd core
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd core
          ruff check .

  core-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd core
          pip install -e ".[dev]"
      - name: Test
        run: |
          cd core
          pytest -v
